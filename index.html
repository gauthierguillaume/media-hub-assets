<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>media-hub-assets</title>

		<style>
			:root {
				--bg: #050505;
				--text: #f5f5f5;
				--muted: #a1a1aa;
				--border: rgba(255, 255, 255, 0.16);
				--card-bg: rgba(20, 20, 20, 0.78);
				--card-bg-hover: rgba(35, 35, 35, 0.9);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background: var(--bg);
				color: var(--text);
				font-family: Arial, Helvetica, sans-serif;
				overflow: hidden;
			}

			.hero-bg {
				position: fixed;
				inset: 0;
				z-index: -3;
				background-size: cover;
				background-position: center;
				background-repeat: no-repeat;
				transition:
					background-image 0.35s ease,
					opacity 0.35s ease;
			}

			.hero-overlay {
				position: fixed;
				inset: 0;
				z-index: -2;
				background: linear-gradient(to right, rgba(0, 0, 0, 0.62) 0%, rgba(0, 0, 0, 0.28) 24%, rgba(0, 0, 0, 0.06) 48%, rgba(0, 0, 0, 0) 100%), linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.08) 55%, rgba(0, 0, 0, 0.55) 100%);
			}

			.page {
				height: 100vh;
				overflow: hidden;
			}

			.rows {
				position: fixed;
				left: 0;
				right: 0;
				bottom: 0;
				height: 52vh;
				z-index: 6;
				display: flex;
				flex-direction: column;
				gap: 44px;
				overflow-y: auto;
				overflow-x: hidden;
				padding: 0 54px 76px;
				background: linear-gradient(to bottom, rgba(5, 5, 5, 0.04) 0%, rgba(5, 5, 5, 0.55) 18%, rgba(5, 5, 5, 0.95) 100%);
			}

			.rows::-webkit-scrollbar {
				width: 10px;
			}

			.rows::-webkit-scrollbar-track {
				background: rgba(255, 255, 255, 0.05);
			}

			.rows::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.18);
				border-radius: 999px;
			}

			.row:first-child {
				padding-top: 18px;
			}

			.row-title {
				display: flex;
				align-items: center;
				gap: 12px;
				margin: 0 0 18px;
				font-size: 28px;
				font-weight: 700;
				color: #f4f4f5;
				text-shadow: 0 3px 18px rgba(0, 0, 0, 0.85);
			}

			.row-scroller {
				display: flex;
				gap: 22px;
				overflow-x: auto;
				overflow-y: visible;
				padding: 8px 0 22px;
				scroll-behavior: smooth;
			}

			.row-scroller::-webkit-scrollbar {
				height: 10px;
			}

			.row-scroller::-webkit-scrollbar-track {
				background: rgba(255, 255, 255, 0.06);
				border-radius: 999px;
			}

			.row-scroller::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.18);
				border-radius: 999px;
			}

			.asset-card {
				flex: 0 0 360px;
				border: 3px solid transparent;
				padding: 0;
				border-radius: 18px;
				overflow: hidden;
				background: var(--card-bg);
				color: var(--text);
				text-align: left;
				cursor: pointer;
				box-shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
				opacity: 1;
				transition:
					border-color 0.16s ease,
					box-shadow 0.16s ease,
					background 0.16s ease;
			}

			.asset-card:hover {
				background: var(--card-bg-hover);
			}

			.asset-card.active {
				border-color: rgba(255, 255, 255, 0.96);
				box-shadow:
					0 0 0 2px rgba(255, 255, 255, 0.22),
					0 0 28px rgba(255, 255, 255, 0.18),
					0 18px 42px rgba(0, 0, 0, 0.58);
			}

			.cover {
				width: 100%;
				aspect-ratio: 16 / 9;
				background: #111;
				overflow: hidden;
			}

			.cover img {
				width: 100%;
				height: 100%;
				display: block;
				object-fit: cover;
			}

			.card-body {
				padding: 14px 16px 16px;
			}

			.asset-name {
				margin-bottom: 12px;
				color: #ffffff;
				font-size: 18px;
				font-weight: 800;
			}

			.actions {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
			}

			.action {
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 10px;
				padding: 8px 10px;
				background: rgba(255, 255, 255, 0.08);
				color: white;
				font-size: 12px;
				font-weight: 800;
				cursor: pointer;
			}

			.action:hover {
				background: rgba(255, 255, 255, 0.15);
			}

			.toast {
				position: fixed;
				left: 50%;
				bottom: 28px;
				transform: translateX(-50%) translateY(20px);
				max-width: min(900px, calc(100vw - 40px));
				padding: 13px 18px;
				border-radius: 999px;
				background: #22c55e;
				color: #052e16;
				font-size: 14px;
				font-weight: 900;
				opacity: 0;
				pointer-events: none;
				transition:
					opacity 0.18s ease,
					transform 0.18s ease;
				box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				z-index: 50;
			}

			.toast.show {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}

			@media (max-width: 900px) {
				.rows {
					height: 56vh;
					padding: 0 20px 56px;
				}

				.asset-card {
					flex-basis: 290px;
				}

				.row-title {
					font-size: 24px;
				}
			}
		</style>
	</head>

	<body>
		<div class="hero-bg" id="heroBg"></div>
		<div class="hero-overlay"></div>

		<main class="page">
			<section class="rows" id="rows"></section>
		</main>

		<div class="toast" id="toast">url copiée ✓</div>

		<script>
			const rows = [
				{
					title: "🎥 Collections",
					items: [
						{
							name: "⭐ IMDb Charts",
							cover: "assets/collections/imdb-charts--cover.png",
							hero: "assets/collections/imdb-charts--cover.png",
						},
						{
							name: "🎃 Horreur",
							cover: "assets/collections/horreur--cover.png",
							hero: "assets/collections/horreur--hero.png",
						},
						{
							name: "🅽⠀NETFLIX kids",
							cover: "assets/collections/netflix-kids--cover.png",
							hero: "assets/collections/netflix-kids--cover.png",
						},
						{
							name: "📺 TV",
							cover: "assets/collections/tv--cover.png",
							hero: "assets/collections/tv--hero.png",
						},
					],
				},
				{
					title: "⛩️ Anime",
					items: [
						{
							name: "🏆 MyAnimeList Charts",
							cover: "assets/anime/myanimelist-charts--cover.png",
							hero: "assets/anime/myanimelist-charts--hero.png",
						},
						{
							name: "🔥 Populaires",
							cover: "assets/anime/populaires--cover.png",
							hero: "assets/anime/populaires--hero.png",
						},
						{
							name: "改⠀Fankaï",
							cover: "assets/anime/fankai--cover.png",
							hero: "assets/anime/fankai--hero.png",
						},
					],
				},
				{
					title: "🎞️ Animation",
					items: [
						{
							name: "🏰 Disney",
							cover: "assets/animation/disney--cover.gif",
							hero: "assets/animation/disney--hero.webp",
						},
						{
							name: "🌙 DreamWorks",
							cover: "assets/animation/dreamworks--cover.gif",
							hero: "assets/animation/dreamworks--hero.webp",
						},
						{
							name: "🗻 Ghibli",
							cover: "assets/animation/ghibli--cover.webp",
							hero: "assets/animation/ghibli--hero.webp",
						},
						{
							name: "🧿 Illumination",
							cover: "assets/animation/illumination--cover.gif",
							hero: "assets/animation/illumination--hero.webp",
						},
						{
							name: "💡 Pixar",
							cover: "assets/animation/pixar--cover.gif",
							hero: "assets/animation/pixar--hero.webp",
						},
						{
							name: "🕷️ Sony Pictures Animation",
							cover: "assets/animation/sony-pictures-animation--cover.gif",
							hero: "assets/animation/sony-pictures-animation--hero.webp",
						},
					],
				},
				{
					title: "📚 Univers",
					items: [
						{
							name: "💍 Tolkien",
							cover: "assets/univers/tolkien--cover.gif",
							hero: "assets/univers/tolkien--hero.webp",
						},
						{
							name: "🕷️ MARVEL",
							cover: "assets/univers/marvel--cover.gif",
							hero: "assets/univers/marvel--hero.webp",
						},
						{
							name: "🦸 DC",
							cover: "assets/univers/dc--cover.gif",
							hero: "assets/univers/dc--hero.webp",
						},
						{
							name: "✨ STAR WARS",
							cover: "assets/univers/star-wars--cover.gif",
							hero: "assets/univers/star-wars--hero.webp",
						},
					],
				},
			];

			const rowsContainer = document.getElementById("rows");
			const heroBg = document.getElementById("heroBg");
			const toast = document.getElementById("toast");

			function getBaseUrl() {
				return window.location.origin + window.location.pathname.replace(/\/$/, "");
			}

			function fullUrl(path) {
				return getBaseUrl() + "/" + path;
			}

			function copyUrl(path) {
				const url = fullUrl(path);

				navigator.clipboard.writeText(url).then(() => {
					toast.textContent = "url copiée ✓ " + url;
					toast.classList.add("show");

					setTimeout(() => {
						toast.classList.remove("show");
					}, 1800);
				});
			}

			function focusAsset(item, card) {
				heroBg.style.backgroundImage = `url("${item.hero || item.cover}")`;

				document.querySelectorAll(".asset-card").forEach((el) => {
					el.classList.remove("active");
				});

				card.classList.add("active");
			}

			function createCard(item, isFirst) {
				const card = document.createElement("button");
				card.className = "asset-card";
				card.type = "button";

				card.innerHTML = `
        <div class="cover">
          <img src="${item.cover}" alt="${item.name}">
        </div>

        <div class="card-body">
          <div class="asset-name">${item.name}</div>

          <div class="actions">
            <span class="action" data-copy="cover">copier cover</span>
            ${item.hero && item.hero !== item.cover ? `<span class="action" data-copy="hero">copier hero</span>` : ""}
          </div>
        </div>
      `;

				card.addEventListener("click", (event) => {
					const action = event.target.closest(".action");

					if (action) {
						event.stopPropagation();

						if (action.dataset.copy === "hero") {
							copyUrl(item.hero);
						} else {
							copyUrl(item.cover);
						}

						return;
					}

					focusAsset(item, card);
				});

				card.addEventListener("mouseenter", () => {
					focusAsset(item, card);
				});

				if (isFirst) {
					setTimeout(() => focusAsset(item, card), 0);
				}

				return card;
			}

			function renderRows() {
				rows.forEach((row, rowIndex) => {
					const section = document.createElement("section");
					section.className = "row";

					const title = document.createElement("h2");
					title.className = "row-title";
					title.textContent = row.title;

					const scroller = document.createElement("div");
					scroller.className = "row-scroller";

					row.items.forEach((item, itemIndex) => {
						const isFirst = rowIndex === 0 && itemIndex === 0;
						scroller.appendChild(createCard(item, isFirst));
					});

					section.appendChild(title);
					section.appendChild(scroller);
					rowsContainer.appendChild(section);
				});
			}

			renderRows();
		</script>
	</body>
</html>
